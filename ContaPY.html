<script>
// Lógica de Navegación
function showPage(pageId, element) {
    // Actualizar menú lateral
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    element.classList.add('active');
    
    // Cambiar página
    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    const targetPage = document.getElementById('page-' + pageId);
    if(targetPage) targetPage.classList.add('active');
    
    // Actualizar título de la topbar
    const title = element.innerText.replace(/[^\w\s]/gi, '').trim();
    document.getElementById('topbar-title').innerText = title;
}

// Lógica de Modales
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Login Simulado
function doLogin() {
    document.getElementById('login-wrap').style.opacity = '0';
    setTimeout(() => { document.getElementById('login-wrap').style.display = 'none'; }, 300);
}

function doLogout() {
    document.getElementById('login-wrap').style.display = 'flex';
    setTimeout(() => { document.getElementById('login-wrap').style.opacity = '1'; }, 10);
}

// Filtro de Comprobantes
function filtrarComprobantes(tipo, element) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    element.classList.add('active');
    
    const rows = document.querySelectorAll('#tabla-comprobantes tr');
    rows.forEach(row => {
        if(tipo === 'todos' || row.getAttribute('data-tipo') === tipo) {
            row.style.display = 'table-row';
        } else {
            row.style.display = 'none';
        }
    });
}
</script>
