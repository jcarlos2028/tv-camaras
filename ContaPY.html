<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaPY v4.0 — Sistema Contable</title>
    
    <!-- Firebase Versión 8 (La mejor para compatibilidad con Windows/EXE) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --bg:#f0f2f5; --dark:#0f1923; --accent:#e63946; --white:#ffffff; }
        
        /* FIX TOTAL PARA EL EXE: Desactivar arrastre en todo el cuerpo */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-app-region: no-drag; }
        
        body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Barra Lateral */
        .sidebar { width: 230px; background: var(--dark); color: white; padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; opacity: 0.8; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); opacity: 1; }

        /* Contenido */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Solo la barra superior permite arrastrar la ventana en el EXE */
        .topbar { 
            background: white; height: 60px; display: flex; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid #ddd; justify-content: space-between;
            -webkit-app-region: drag; 
        }
        .topbar-title { font-weight: bold; -webkit-app-region: drag; }
        .topbar select { -webkit-app-region: no-drag; cursor: pointer; padding: 5px; }

        .content { padding: 25px; overflow-y: auto; flex: 1; }
        .page { display: none; } .page.active { display: block; }

        /* UI */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        /* FORMULARIOS: FIX PARA EXE (Permitir teclado) */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; 
            background: white !important; color: black !important;
            /* Estos comandos fuerzan al EXE a aceptar clics y teclado */
            pointer-events: auto !important;
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; padding: 30px; border-radius: 15px; width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }

        /* Login */
        .login-wrap { position: fixed; inset: 0; background: var(--dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 25px; width: 360px; text-align: center; }
    </style>
</head>
<body>

<!-- PANTALLA LOGIN -->
<div class="login-wrap" id="login-wrap">
    <div class="login-card">
        <h2 style="margin-bottom:20px">ContaPY Access</h2>
        <div class="form-group"><input type="text" id="lu" placeholder="Usuario / Email"></div>
        <div class="form-group"><input type="password" id="lp" placeholder="Contraseña"></div>
        <button class="btn btn-primary" style="width:100%" onclick="window.doLogin()">Ingresar</button>
        <p id="l-msg" style="color:red; margin-top:15px; font-size:12px; font-weight:bold"></p>
    </div>
</div>

<div class="sidebar">
    <h2 style="color:var(--accent); margin-bottom:30px">🧾 ContaPY</h2>
    <div class="nav-item active" id="menu-dash" onclick="showPage('dashboard', this)">🏠 Dashboard</div>
    <div class="nav-item" id="menu-cli" onclick="showPage('clientes', this)">🏢 Clientes</div>
    <div style="margin-top:auto">
        <button class="btn" style="width:100%; background:rgba(255,255,255,0.1); color:white" onclick="window.doLogout()">Salir</button>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div class="topbar-title" id="txt-topbar">Dashboard Principal</div>
        <select id="lang_sel" onchange="window.changeLang(this.value)">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="pt">Português</option>
        </select>
    </div>

    <div class="content">
        <!-- DASHBOARD -->
        <div class="page active" id="page-dashboard">
            <div class="card">
                <h2 id="txt-welcome">Bienvenido 👋</h2>
                <p id="txt-sub">Los datos se sincronizan con la PC y la Nube.</p>
            </div>
            <div class="card">
                <h3 id="txt-list-title">Resumen de Cartera</h3>
                <table>
                    <thead><tr><th id="th-ruc1">RUC</th><th id="th-nom1">Nombre</th></tr></thead>
                    <tbody id="dash-list"></tbody>
                </table>
            </div>
        </div>

        <!-- CLIENTES -->
        <div class="page" id="page-clientes">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 id="txt-cli-title">Directorio</h2>
                <button class="btn btn-primary" id="btn-new" onclick="window.openModalCliente()">+ Nuevo Cliente</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th id="th-ruc2">RUC</th><th id="th-nom2">Nombre</th><th id="th-act">Acción</th></tr></thead>
                    <tbody id="tabla-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <h3 id="txt-modal-title" style="margin-bottom:20px">Datos del Cliente</h3>
        <div class="form-group"><label id="lbl-ruc">RUC:</label><input type="text" id="cli_ruc"></div>
        <div class="form-group"><label id="lbl-nom">Nombre:</label><input type="text" id="cli_nom"></div>
        <div style="text-align:right; margin-top:20px">
            <button class="btn" style="background:#ccc" onclick="window.closeModal()">Cancelar</button>
            <button class="btn btn-primary" id="btn-save" onclick="window.guardarCliente()">💾 Guardar Datos</button>
        </div>
    </div>
</div>

<script>
    // --- VARIABLES ---
    window.dbClientes = JSON.parse(localStorage.getItem('contapy_data')) || [];

    // --- IDIOMAS CORREGIDO (Sin fallos de puntero) ---
    window.changeLang = function(lang) {
        localStorage.setItem('contapy_lang', lang);
        console.log("Cambiando a: " + lang);

        var t = {
            es: { top: "Dashboard Principal", welcome: "Bienvenido 👋", sub: "Datos en PC y Nube.", list: "Resumen de Cartera", cli: "Directorio", ruc: "RUC", nom: "Nombre", act: "Acción", modal: "Datos del Cliente", save: "💾 Guardar", new: "+ Nuevo Cliente" },
            en: { top: "Main Dashboard", welcome: "Welcome 👋", sub: "Data synced to PC and Cloud.", list: "Portfolio Summary", cli: "Directory", ruc: "Tax ID", nom: "Legal Name", act: "Action", modal: "Client Details", save: "💾 Save Data", new: "+ New Client" },
            pt: { top: "Painel Principal", welcome: "Bem-vindo 👋", sub: "Dados sincronizados no PC e Nuvem.", list: "Resumo da Carteira", cli: "Diretório", ruc: "RUC/CPF", nom: "Razão Social", act: "Ação", modal: "Dados do Cliente", save: "💾 Salvar Dados", new: "+ Novo Cliente" }
        };

        var sel = t[lang] || t.es;
        document.getElementById('txt-topbar').innerText = sel.top;
        document.getElementById('txt-welcome').innerText = sel.welcome;
        document.getElementById('txt-sub').innerText = sel.sub;
        document.getElementById('txt-list-title').innerText = sel.list;
        document.getElementById('txt-cli-title').innerText = sel.cli;
        document.getElementById('th-ruc1').innerText = sel.ruc;
        document.getElementById('th-ruc2').innerText = sel.ruc;
        document.getElementById('th-nom1').innerText = sel.nom;
        document.getElementById('th-nom2').innerText = sel.nom;
        document.getElementById('th-act').innerText = sel.act;
        document.getElementById('txt-modal-title').innerText = sel.modal;
        document.getElementById('btn-save').innerText = sel.save;
        document.getElementById('btn-new').innerText = sel.new;
    };

    // --- INTERFAZ ---
    window.showPage = function(name, el) {
        document.getElementById('page-dashboard').classList.remove('active');
        document.getElementById('page-clientes').classList.remove('active');
        document.getElementById('page-' + name).classList.add('active');
        
        document.getElementById('menu-dash').classList.remove('active');
        document.getElementById('menu-cli').classList.remove('active');
        el.classList.add('active');
    };

    window.openModalCliente = function() {
        document.getElementById('cli_ruc').value = "";
        document.getElementById('cli_nom').value = "";
        document.getElementById('modal-cliente').classList.add('open');
        setTimeout(function(){ document.getElementById('cli_ruc').focus(); }, 300);
    };

    window.closeModal = function() { document.getElementById('modal-cliente').classList.remove('open'); };

    window.guardarCliente = function() {
        var r = document.getElementById('cli_ruc').value.trim();
        var n = document.getElementById('cli_nom').value.trim();
        if(!r || !n) return alert("Complete los campos.");

        window.dbClientes.push({ ruc: r, nom: n });
        // Guardar en PC
        localStorage.setItem('contapy_data', JSON.stringify(window.dbClientes));
        // Guardar en Nube (si la función existe)
        if(window.saveToFirebase) window.saveToFirebase();
        
        window.render();
        window.closeModal();
        alert("✅ Cliente guardado.");
    };

    window.borrar = function(i) {
        if(confirm("¿Borrar?")) {
            window.dbClientes.splice(i, 1);
            localStorage.setItem('contapy_data', JSON.stringify(window.dbClientes));
            if(window.saveToFirebase) window.saveToFirebase();
            window.render();
        }
    };

    window.render = function() {
        var t = document.getElementById('tabla-list');
        var d = document.getElementById('dash-list');
        t.innerHTML = ""; d.innerHTML = "";
        for(var i=0; i < window.dbClientes.length; i++) {
            var c = window.dbClientes[i];
            t.innerHTML += '<tr><td>'+c.ruc+'</td><td>'+c.nom+'</td><td><button class="btn" style="background:#eee" onclick="window.borrar('+i+')">🗑️</button></td></tr>';
            d.innerHTML += '<tr><td><b>'+c.ruc+'</b></td><td>'+c.nom+'</td></tr>';
        }
    };

    // --- FIREBASE ---
    var config = {
        apiKey: "AIzaSyBn3tcXb3WpVojYmMX603L68jhOqzW8abg",
        authDomain: "contapy-f85f9.firebaseapp.com",
        projectId: "contapy-f85f9",
        storageBucket: "contapy-f85f9.firebasestorage.app",
        messagingSenderId: "230770781636",
        appId: "1:230770781636:web:5114af83fb351c15b68891"
    };
    firebase.initializeApp(config);

    window.doLogin = function() {
        var u = document.getElementById('lu').value;
        var p = document.getElementById('lp').value;
        firebase.auth().signInWithEmailAndPassword(u, p).catch(function(e){
            document.getElementById('l-msg').innerText = "Acceso incorrecto.";
        });
    };

    window.doLogout = function() { firebase.auth().signOut().then(function(){ location.reload(); }); };

    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            document.getElementById('login-wrap').style.display = 'none';
            window.render();
            // Aplicar idioma guardado
            var savedLang = localStorage.getItem('contapy_lang') || 'es';
            document.getElementById('lang_sel').value = savedLang;
            window.changeLang(savedLang);
        } else {
            document.getElementById('login-wrap').style.display = 'flex';
        }
    });
</script>
</body>
</html>
