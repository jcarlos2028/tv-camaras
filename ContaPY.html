<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://api.anthropic.com https://identitytoolkit.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://api.anthropic.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:;">
<title>ContaPY v4.0 — Sistema Contable Cloud Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;--sidebar:#0f1923;--sidebar-hover:#1a2535;--accent:#e63946;
  --accent2:#2196f3;--white:#fff;--card:#fff;--text:#1a1a2e;--text-light:#6b7280;
  --border:#e5e7eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;-webkit-app-region: no-drag;}
.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;z-index:100;transition:all 0.3s;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{color:white;font-size:17px;font-weight:700;letter-spacing:-.5px}
.logo-sub{color:rgba(255,255,255,.3);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:1px}
.nav-item.active{background:var(--accent);color:white}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0;-webkit-app-region: drag;}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.topbar select, .topbar .btn-icon { -webkit-app-region: no-drag; }
.content{flex:1;overflow-y:auto;padding:20px;position:relative;}
.page{display:none} .page.active{display:block}
.card{background:var(--card);border-radius:10px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:18px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:10px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card.blue::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent2)}
.stat-value{font-size:22px;font-weight:700;margin:6px 0 3px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text-light);text-transform:uppercase;border-bottom:2px solid var(--border)}
tbody td{padding:10px 10px;border-bottom:1px solid var(--border)}
.badge-status{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.badge-status.ok{background:#d1fae5;color:#065f46}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
label{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase}
input,select,textarea{padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none;-webkit-app-region: no-drag;}
.btn{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:white}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}

/* MODALES CORREGIDOS PARA EXE */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;-webkit-app-region: no-drag;}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:90%;max-width:600px;box-shadow:var(--shadow-lg);position:relative;max-height:88vh;display:flex;flex-direction:column;-webkit-app-region: no-drag;}
.modal-drag-header{background:var(--bg);padding:12px;cursor:move;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-body-scroll{padding:20px;overflow-y:auto; -webkit-app-region: no-drag;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div id="login-loading" style="color:white;text-align:center">
      <h2>Conectando Nube...</h2>
  </div>
  <div class="login-card" id="login-card" style="display:none">
    <h1 style="text-align:center;margin-bottom:20px">ContaPY Cloud</h1>
    <div class="form-group"><label>Usuario</label><input type="text" id="lu" placeholder="correo@ejemplo.com"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px" onclick="window.doLogin()">Ingresar</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo"><div class="logo-text">ContaPY v4.0</div></div>
  <div class="nav-item active" onclick="showPage('dashboard',this)">🏠 Dashboard</div>
  <div class="nav-item" onclick="showPage('clientes',this)">🏢 Clientes</div>
  <div style="margin-top:auto; padding:10px">
      <button class="btn btn-outline" style="width:100%;color:white" onclick="location.reload()">Cerrar Sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard Principal</div>
    <select id="lang_sel" onchange="window.changeLang(this.value)">
        <option value="es">ES</option><option value="en">EN</option><option value="pt">PT</option>
    </select>
  </div>

  <div class="content">
    <div class="page active" id="page-dashboard">
      <div class="stats-grid">
        <div class="stat-card blue"><div class="stat-label">Clientes Activos</div><div class="stat-value" id="dash_cli_count">0</div></div>
      </div>
      <div class="card">
        <div class="card-title">Acceso Rápido</div>
        <table id="dash-clientes-list"></table>
      </div>
    </div>

    <div class="page" id="page-clientes">
      <div style="display:flex;justify-content:space-between;margin-bottom:20px">
        <h2>Directorio de Clientes</h2>
        <button class="btn btn-primary" onclick="window.openModalCliente()">+ Nuevo Cliente</button>
      </div>
      <div class="card">
          <table style="width:100%">
              <thead><tr><th>RUC</th><th>Nombre</th><th>Estado</th><th>Acción</th></tr></thead>
              <tbody id="tabla-clientes-list"></tbody>
          </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-drag-header"><span id="m-cli-title" style="font-weight:700">🏢 Cliente</span><button onclick="window.closeModal('modal-cliente')" style="background:none;border:none;cursor:pointer">✕</button></div>
    <div class="modal-body-scroll">
        <div class="form-group"><label>RUC</label><input type="text" id="cli_ruc"></div>
        <div class="form-group"><label>Razón Social</label><input type="text" id="cli_nom"></div>
        <div class="form-group"><label>Estado</label><select id="cli_estado"><option value="activo">Activo</option><option value="inactivo">Inactivo</option></select></div>
        <div style="margin-top:10px">
            <label>Impuestos:</label><br>
            <label><input type="checkbox" id="tax_iva"> IVA</label>
            <label><input type="checkbox" id="tax_ire"> IRE</label>
        </div>
        <div style="margin-top:20px;text-align:right">
            <button class="btn btn-primary" onclick="window.guardarCliente()">💾 Guardar en Nube</button>
        </div>
    </div>
  </div>
</div>

<script>
window.dbClientes = [];
window.editandoCliIdx = -1;

// IDIOMAS CORREGIDO
const i18n = {
    es: { dash: "Dashboard Principal", cli: "Directorio de Clientes" },
    en: { dash: "Main Dashboard", cli: "Clients Directory" },
    pt: { dash: "Painel Principal", cli: "Diretório de Clientes" }
};

window.changeLang = function(lang) {
    localStorage.setItem('contapy_lang', lang);
    const t = i18n[lang] || i18n.es;
    document.getElementById('topbar-title').textContent = t.dash;
};

window.showPage = function(name, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(el) el.classList.add('active');
    if(name === 'clientes') window.renderClientes();
};

window.openModal = function(id) { document.getElementById(id).classList.add('open'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };

// CLIENTES CORREGIDO
window.openModalCliente = function(idx = -1) {
    window.editandoCliIdx = idx;
    // RESET TOTAL
    document.getElementById('cli_ruc').value = '';
    document.getElementById('cli_nom').value = '';
    document.getElementById('cli_estado').value = 'activo';
    document.getElementById('tax_iva').checked = false;
    document.getElementById('tax_ire').checked = false;

    if(idx >= 0) {
        const c = window.dbClientes[idx];
        document.getElementById('cli_ruc').value = c.ruc;
        document.getElementById('cli_nom').value = c.nom;
        document.getElementById('cli_estado').value = c.estado;
        if(c.taxes) {
            document.getElementById('tax_iva').checked = c.taxes.includes('IVA');
            document.getElementById('tax_ire').checked = c.taxes.includes('IRE');
        }
        document.getElementById('m-cli-title').textContent = "✏️ Editar Cliente";
    } else {
        document.getElementById('m-cli-title').textContent = "🏢 Nuevo Cliente";
    }
    window.openModal('modal-cliente');
};

window.guardarCliente = async function() {
    const ruc = document.getElementById('cli_ruc').value.trim();
    const nom = document.getElementById('cli_nom').value.trim();
    if(!ruc || !nom) return alert("RUC y Nombre obligatorios");

    const tx = [];
    if(document.getElementById('tax_iva').checked) tx.push('IVA');
    if(document.getElementById('tax_ire').checked) tx.push('IRE');

    const obj = {
        id: (window.editandoCliIdx >= 0) ? window.dbClientes[window.editandoCliIdx].id : Date.now(),
        ruc: ruc, nom: nom, estado: document.getElementById('cli_estado').value,
        taxes: tx, libros: { compras:[], ventas:[], diario:[] }
    };

    if(window.editandoCliIdx >= 0) {
        window.dbClientes[window.editandoCliIdx] = obj;
    } else {
        window.dbClientes.push(obj);
    }

    await window.saveData();
    window.renderClientes();
    window.closeModal('modal-cliente');
    alert("✅ Sincronizado correctamente.");
};

window.renderClientes = function() {
    const tbody = document.getElementById('tabla-clientes-list');
    if(!tbody) return;
    tbody.innerHTML = '';
    window.dbClientes.forEach((c, i) => {
        tbody.innerHTML += `<tr><td>${c.ruc}</td><td>${c.nom}</td><td><span class="badge-status ok">${c.estado}</span></td><td><button class="btn btn-outline btn-sm" onclick="window.openModalCliente(${i})">✏️</button></td></tr>`;
    });
    document.getElementById('dash_cli_count').textContent = window.dbClientes.length;
};

window.saveData = async function() { console.log("Nube..."); };
window.doLogin = async function() { console.log("Nube..."); };
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBn3tcXb3WpVojYmMX603L68jhOqzW8abg",
    authDomain: "contapy-f85f9.firebaseapp.com",
    projectId: "contapy-f85f9",
    storageBucket: "contapy-f85f9.firebasestorage.app",
    messagingSenderId: "230770781636",
    appId: "1:230770781636:web:5114af83fb351c15b68891"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.doLogin = async function() {
      const u = document.getElementById('lu').value;
      const p = document.getElementById('lp').value;
      try { await signInWithEmailAndPassword(auth, u, p); } catch(e) { alert("Error de acceso"); }
  };

  window.saveData = async function() {
      try { await setDoc(doc(db, "sistema", "datos_principales"), { clientes: window.dbClientes }); } catch(e) { console.error(e); }
  };

  onAuthStateChanged(auth, async (user) => {
      if (user) {
          document.getElementById('login-wrap').style.display = 'none';
          const snap = await getDoc(doc(db, "sistema", "datos_principales"));
          if(snap.exists()) { window.dbClientes = snap.data().clientes || []; }
          window.renderClientes();
          const l = localStorage.getItem('contapy_lang') || 'es';
          window.changeLang(l);
      } else {
          document.getElementById('login-card').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
      }
  });
</script>
</body>
</html>
