<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ContaPY Cloud - EXE FIX</title>
    <style>
        /* FIX TOTAL PARA EXES BLOQUEADOS */
        :root { --accent: #e63946; --dark: #0f1923; }
        
        /* 1. DESACTIVAR ARRASTRE GLOBAL (Esto es lo que bloquea tu teclado) */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-app-region: no-drag !important; /* Desactiva el arrastre en todo */
            user-select: text !important; /* Permite seleccionar y escribir */
            -webkit-user-select: text !important;
        }

        body { display: flex; height: 100vh; background: #f0f2f5; overflow: hidden; }

        /* 2. AREA DE ARRASTRE MINIMA (Solo esta barrita servirá para mover la ventana) */
        .drag-handle {
            position: fixed; top: 0; left: 0; width: 100%; height: 10px;
            -webkit-app-region: drag !important; z-index: 999999;
        }

        .sidebar { width: 230px; background: var(--dark); color: white; padding: 20px; flex-shrink: 0; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: white; height: 50px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #ddd; }
        .content { padding: 20px; overflow-y: auto; flex: 1; }

        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* 3. INPUTS FORZADOS (Para que el EXE los deje usar) */
        input, select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 2px solid #ccc; border-radius: 6px;
            font-size: 16px; color: black !important;
            background-color: white !important;
            display: block !important;
            pointer-events: auto !important; /* Fuerza a recibir clics */
            cursor: text !important;
        }

        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; background: var(--accent); color: white; }

        /* MODAL SIMPLE */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 5000; align-items: center; justify-content: center; 
        }
        .modal-overlay.open { display: flex; }
        .modal { background: white; padding: 30px; border-radius: 12px; width: 400px; }

        .nav-item { padding: 10px; cursor: pointer; margin-bottom: 5px; border-radius: 5px; }
        .nav-item.active { background: var(--accent); }
    </style>
</head>
<body>

<div class="drag-handle"></div>

<!-- LOGIN -->
<div id="login-wrap" style="position:fixed;inset:0;background:var(--dark);z-index:10000;display:flex;align-items:center;justify-content:center;color:white;">
    <div style="background:white;padding:40px;border-radius:20px;width:350px;color:black;text-align:center">
        <h2 style="margin-bottom:20px">ContaPY Cloud</h2>
        <input type="text" id="lu" placeholder="Email o Usuario">
        <input type="password" id="lp" placeholder="Contraseña">
        <button class="btn" style="width:100%" onclick="window.doLogin()">Entrar</button>
    </div>
</div>

<div class="sidebar">
    <h2 style="margin-bottom:20px">ContaPY</h2>
    <div class="nav-item active" onclick="location.reload()">🏠 Dashboard</div>
    <div class="nav-item" onclick="window.openModalCliente()">➕ Nuevo Cliente</div>
</div>

<div class="main">
    <div class="topbar"><b>Panel Administrador</b></div>
    <div class="content">
        <div class="card">
            <h3>Lista de Contribuyentes</h3>
            <table style="width:100%; margin-top:15px; text-align:left">
                <thead><tr><th>RUC</th><th>Nombre</th><th>Acciones</th></tr></thead>
                <tbody id="lista-clientes"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <h3 style="margin-bottom:20px">Registrar Cliente</h3>
        <input type="text" id="cli_ruc" placeholder="RUC (ej: 123456-7)">
        <input type="text" id="cli_nom" placeholder="Razón Social o Nombre">
        <div style="text-align:right">
            <button class="btn" style="background:#888" onclick="window.closeModal()">Cancelar</button>
            <button class="btn" onclick="window.guardarCliente()">💾 Guardar</button>
        </div>
    </div>
</div>

<script>
window.dbClientes = [];

window.doLogin = async function() {
    const u = document.getElementById('lu').value;
    const p = document.getElementById('lp').value;
    // La lógica real está en el script de abajo
    if(window.firebaseLogin) window.firebaseLogin(u, p);
};

window.openModalCliente = function() {
    document.getElementById('cli_ruc').value = '';
    document.getElementById('cli_nom').value = '';
    document.getElementById('modal-cliente').classList.add('open');
    // Forzar el foco
    setTimeout(() => { document.getElementById('cli_ruc').focus(); }, 300);
};

window.closeModal = function() {
    document.getElementById('modal-cliente').classList.remove('open');
};

window.guardarCliente = async function() {
    const r = document.getElementById('cli_ruc').value.trim();
    const n = document.getElementById('cli_nom').value.trim();
    if(!r || !n) return alert("RUC y Nombre requeridos");

    window.dbClientes.push({ ruc: r, nom: n });
    await window.saveData();
    window.render();
    window.closeModal();
    alert("✅ Guardado con éxito.");
};

window.render = function() {
    const tbody = document.getElementById('lista-clientes');
    tbody.innerHTML = '';
    window.dbClientes.forEach((c) => {
        tbody.innerHTML += `<tr><td>${c.ruc}</td><td>${c.nom}</td><td>✏️</td></tr>`;
    });
};
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3tcXb3WpVojYmMX603L68jhOqzW8abg",
        authDomain: "contapy-f85f9.firebaseapp.com",
        projectId: "contapy-f85f9",
        storageBucket: "contapy-f85f9.firebasestorage.app",
        messagingSenderId: "230770781636",
        appId: "1:230770781636:web:5114af83fb351c15b68891"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseLogin = async (u, p) => {
        try { await signInWithEmailAndPassword(auth, u, p); } catch(e) { alert("Acceso fallido"); }
    };

    window.saveData = async () => {
        await setDoc(doc(db, "sistema", "datos_principales"), { clientes: window.dbClientes });
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-wrap').style.display = 'none';
            const snap = await getDoc(doc(db, "sistema", "datos_principales"));
            if(snap.exists()) window.dbClientes = snap.data().clientes || [];
            window.render();
        } else {
            document.getElementById('login-wrap').style.display = 'flex';
        }
    });
</script>
</body>
</html>
