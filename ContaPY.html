<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaPY v4.0 — Sistema Contable Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;--sidebar:#0f1923;--accent:#e63946;--accent2:#2196f3;--white:#fff;
  --text:#1a1a2e;--text-light:#6b7280;--border:#e5e7eb;--success:#10b981;--danger:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;color:white;padding:20px 10px}
.nav-item{padding:12px;cursor:pointer;border-radius:8px;margin-bottom:5px;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7)}
.nav-item:hover, .nav-item.active{background:var(--accent);color:white}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.content{padding:20px;overflow-y:auto;flex:1}
.page{display:none} .page.active{display:block}
.card{background:white;padding:20px;border-radius:12px;box-shadow:var(--shadow);margin-bottom:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th{text-align:left;font-size:11px;color:var(--text-light);text-transform:uppercase;padding:10px;border-bottom:2px solid var(--border)}
td{padding:12px 10px;border-bottom:1px solid var(--border);font-size:13px}
.btn{padding:8px 16px;border-radius:8px;cursor:pointer;border:none;font-weight:600;font-family:inherit}
.btn-primary{background:var(--accent);color:white}
.btn-outline{background:transparent;border:1px solid var(--border)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;padding:25px;border-radius:15px;width:500px;max-width:95%}
.form-group{margin-bottom:15px}
label{display:block;font-size:11px;font-weight:700;margin-bottom:5px;color:var(--text-light)}
input, select{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;outline:none}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--bg)}
.badge-ok{background:#d1fae5;color:#065f46}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap" style="position:fixed;inset:0;background:var(--sidebar);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:white;padding:40px;border-radius:20px;width:350px">
    <h2 style="text-align:center;margin-bottom:20px">ContaPY Cloud</h2>
    <input type="text" id="lu" placeholder="Usuario (Email)" style="margin-bottom:10px">
    <input type="password" id="lp" placeholder="Contraseña" style="margin-bottom:20px">
    <button class="btn btn-primary" style="width:100%" onclick="window.doLogin()">Ingresar</button>
  </div>
</div>

<div class="sidebar">
  <h2 style="padding:10px;font-size:20px;margin-bottom:20px">🧾 ContaPY</h2>
  <div class="nav-item active" onclick="showPage('dashboard',this)">🏠 <span data-i18n="nav_dash">Dashboard</span></div>
  <div class="nav-item" onclick="showPage('clientes',this)">🏢 <span data-i18n="nav_clients">Clientes</span></div>
  <div style="margin-top:auto">
    <button class="btn" style="background:rgba(255,255,255,0.1);color:white;width:100%" onclick="location.reload()">Cerrar Sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h3 id="topbar-title">Dashboard</h3>
    <select id="lang_sel" onchange="window.changeLang(this.value)">
      <option value="es">Español</option>
      <option value="en">English</option>
      <option value="pt">Português</option>
    </select>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="card">
        <h2>Bienvenido 👋</h2>
        <p style="color:var(--text-light)">Sincronización con la nube activa.</p>
      </div>
      <div class="card">
        <h3>Resumen de Clientes Activos</h3>
        <table>
          <thead><tr><th>RUC</th><th>Nombre</th><th>Impuestos</th></tr></thead>
          <tbody id="dash-clientes-list"></tbody>
        </table>
      </div>
    </div>

    <!-- PÁGINA CLIENTES -->
    <div class="page" id="page-clientes">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2>Directorio de Clientes</h2>
        <button class="btn btn-primary" onclick="window.openModalCliente()">+ Nuevo Cliente</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>RUC</th><th>Nombre</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tabla-clientes-list"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <h3 id="m-cli-title" style="margin-bottom:20px">Nuevo Cliente</h3>
    <div class="form-group"><label>RUC</label><input type="text" id="cli_ruc"></div>
    <div class="form-group"><label>Razón Social / Nombre</label><input type="text" id="cli_nom"></div>
    <div class="form-group"><label>Estado</label>
      <select id="cli_estado">
        <option value="activo">Activo</option>
        <option value="inactivo">Inactivo</option>
      </select>
    </div>
    <div style="margin-bottom:20px">
      <label>Impuestos:</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
        <label style="font-weight:400"><input type="checkbox" id="tax_iva"> IVA</label>
        <label style="font-weight:400"><input type="checkbox" id="tax_ire"> IRE</label>
        <label style="font-weight:400"><input type="checkbox" id="tax_irp"> IRP</label>
      </div>
    </div>
    <div style="text-align:right">
      <button class="btn btn-outline" onclick="window.closeModal('modal-cliente')">Cancelar</button>
      <button class="btn btn-primary" onclick="window.guardarCliente()">Guardar en Nube</button>
    </div>
  </div>
</div>

<script>
// VARIABLES GLOBALES (Aseguramos que estén en Window para el EXE)
window.dbClientes = [];
window.editandoCliIdx = -1;

// 1. DICCIONARIO DE IDIOMAS
const translations = {
  es: { nav_dash: "Inicio", nav_clients: "Clientes", top_title: "Dashboard" },
  en: { nav_dash: "Home", nav_clients: "Clients", top_title: "Control Panel" },
  pt: { nav_dash: "Início", nav_clients: "Clientes", top_title: "Painel" }
};

window.changeLang = function(lang) {
  localStorage.setItem('contapy_lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(translations[lang][key]) el.textContent = translations[lang][key];
  });
};

// 2. NAVEGACIÓN
window.showPage = function(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('topbar-title').textContent = name.toUpperCase();
};

window.openModal = function(id) { document.getElementById(id).classList.add('open'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };

// 3. LOGICA DE CLIENTES (CORREGIDA)
window.openModalCliente = function(idx = -1) {
  window.editandoCliIdx = idx;
  console.log("Abriendo modal. Indice:", idx);

  // Resetear formulario
  document.getElementById('cli_ruc').value = '';
  document.getElementById('cli_nom').value = '';
  document.getElementById('cli_estado').value = 'activo';
  document.getElementById('tax_iva').checked = false;
  document.getElementById('tax_ire').checked = false;
  document.getElementById('tax_irp').checked = false;

  if (idx >= 0) {
    const c = window.dbClientes[idx];
    document.getElementById('m-cli-title').textContent = "Editar Cliente";
    document.getElementById('cli_ruc').value = c.ruc || '';
    document.getElementById('cli_nom').value = c.nom || '';
    document.getElementById('cli_estado').value = c.estado || 'activo';
    if(c.taxes) {
        document.getElementById('tax_iva').checked = c.taxes.includes('IVA');
        document.getElementById('tax_ire').checked = c.taxes.includes('IRE');
        document.getElementById('tax_irp').checked = c.taxes.includes('IRP');
    }
  } else {
    document.getElementById('m-cli-title').textContent = "Nuevo Cliente";
  }
  window.openModal('modal-cliente');
};

window.guardarCliente = async function() {
  const ruc = document.getElementById('cli_ruc').value.trim();
  const nom = document.getElementById('cli_nom').value.trim();
  
  if (!ruc || !nom) {
    alert("Por favor rellene RUC y Nombre.");
    return;
  }

  const tx = [];
  if(document.getElementById('tax_iva').checked) tx.push('IVA');
  if(document.getElementById('tax_ire').checked) tx.push('IRE');
  if(document.getElementById('tax_irp').checked) tx.push('IRP');

  const datos = {
    ruc: ruc,
    nom: nom,
    estado: document.getElementById('cli_estado').value,
    taxes: tx,
    libros: { compras:[], ventas:[], diario:[] }
  };

  if (window.editandoCliIdx >= 0) {
    // Mantener los libros existentes si estamos editando
    const librosAnteriores = window.dbClientes[window.editandoCliIdx].libros;
    window.dbClientes[window.editandoCliIdx] = datos;
    window.dbClientes[window.editandoCliIdx].libros = librosAnteriores;
  } else {
    window.dbClientes.push(datos);
  }

  console.log("Guardando datos...", window.dbClientes);
  
  // Guardar en Firebase
  await window.saveData();
  
  window.renderClientes();
  window.closeModal('modal-cliente');
  alert("Sincronizado con la nube correctamente.");
};

window.renderClientes = function() {
  const listaDirectorio = document.getElementById('tabla-clientes-list');
  const listaDash = document.getElementById('dash-clientes-list');
  if(!listaDirectorio) return;

  listaDirectorio.innerHTML = '';
  if(listaDash) listaDash.innerHTML = '';

  window.dbClientes.forEach((c, i) => {
    const tr = `<tr>
      <td>${c.ruc}</td>
      <td><strong>${c.nom}</strong></td>
      <td><span class="badge ${c.estado === 'activo' ? 'badge-ok' : ''}">${c.estado}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="window.openModalCliente(${i})">✏️ Editar</button>
      </td>
    </tr>`;
    listaDirectorio.innerHTML += tr;

    if(c.estado === 'activo' && listaDash) {
        listaDash.innerHTML += `<tr><td>${c.ruc}</td><td>${c.nom}</td><td>${c.taxes.join(', ')}</td></tr>`;
    }
  });
};

// Placeholders
window.saveData = async function() { console.log("Firebase no listo"); };
window.doLogin = async function() { console.log("Firebase no listo"); };
</script>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBn3tcXb3WpVojYmMX603L68jhOqzW8abg",
    authDomain: "contapy-f85f9.firebaseapp.com",
    projectId: "contapy-f85f9",
    storageBucket: "contapy-f85f9.firebasestorage.app",
    messagingSenderId: "230770781636",
    appId: "1:230770781636:web:5114af83fb351c15b68891"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.doLogin = async function() {
    const u = document.getElementById('lu').value;
    const p = document.getElementById('lp').value;
    try { 
        await signInWithEmailAndPassword(auth, u, p); 
    } catch(e) { 
        alert("Credenciales incorrectas"); 
    }
  };

  window.saveData = async function() {
    try {
      await setDoc(doc(db, "sistema", "datos_principales"), { 
          clientes: window.dbClientes 
      });
      console.log("Nube actualizada");
    } catch(e) { console.error("Error nube:", e); }
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('login-wrap').style.display = 'none';
      const snap = await getDoc(doc(db, "sistema", "datos_principales"));
      if(snap.exists()) {
        window.dbClientes = snap.data().clientes || [];
      }
      window.renderClientes();
      const l = localStorage.getItem('contapy_lang') || 'es';
      document.getElementById('lang_sel').value = l;
      window.changeLang(l);
    } else {
      document.getElementById('login-wrap').style.display = 'flex';
    }
  });
</script>
</body>
</html>
