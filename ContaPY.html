<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ContaPY v4.1 — Cloud Edition</title>
    <!-- Firebase Versión Compatible -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --bg:#f0f2f5; --dark:#0f1923; --accent:#e63946; --accent2:#2196f3; }
        
        /* BLOQUEO DE ARRASTRE PARA QUE EL TECLADO FUNCIONE EN EXE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-app-region: no-drag; }
        
        body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 240px; background: var(--dark); color: white; padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; opacity: 0.8; }
        .nav-item.active { background: var(--accent); opacity: 1; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: white; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #ddd; -webkit-app-region: drag; }
        .topbar-title { flex: 1; font-weight: bold; }
        .topbar select { -webkit-app-region: no-drag; }

        .content { padding: 20px; overflow-y: auto; flex: 1; }
        .page { display: none; } .page.active { display: block; }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        /* INPUTS - CLAVE PARA EL EXE */
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; margin-bottom: 10px;
            background: white !important; color: black !important;
            pointer-events: auto !important; -webkit-user-select: text !important; user-select: text !important;
        }

        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--accent2); color: white; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; padding: 30px; border-radius: 15px; width: 450px; }

        /* LOGIN */
        .login-wrap { position: fixed; inset: 0; background: var(--dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 25px; width: 360px; text-align: center; }
    </style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
    <div class="login-card">
        <h2 style="margin-bottom:10px">ContaPY Access</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Sincronización Cloud v4.1</p>
        <input type="text" id="lu" placeholder="Email">
        <input type="password" id="lp" placeholder="Contraseña">
        <button class="btn btn-primary" style="width:100%" onclick="window.doLogin()">Entrar</button>
        <p id="l-msg" style="color:red; margin-top:10px; font-size:12px"></p>
    </div>
</div>

<div class="sidebar">
    <h2 style="color:var(--accent); margin-bottom:30px">🧾 ContaPY</h2>
    <div class="nav-item active" id="m-dash" onclick="showPage('dashboard', this)">🏠 Dashboard</div>
    <div class="nav-item" id="m-cli" onclick="showPage('clientes', this)">🏢 Clientes</div>
    <div class="nav-item" id="m-ia" onclick="showPage('ia', this)">🤖 Claude IA</div>
    <div style="margin-top:auto"><button class="btn" style="width:100%; background:#222; color:white" onclick="location.reload()">Cerrar Sesión</button></div>
</div>

<div class="main">
    <div class="topbar">
        <div class="topbar-title" id="txt-top">Dashboard v4.1</div>
        <select id="lang_sel" onchange="window.changeLang(this.value)" style="width:auto">
            <option value="es">ES</option><option value="en">EN</option><option value="pt">PT</option>
        </select>
    </div>
    <div class="content">
        <!-- DASHBOARD -->
        <div class="page active" id="page-dashboard">
            <div class="card">
                <h2 id="txt-welcome">Bienvenido 👋</h2>
                <p id="txt-sub">Los datos se guardan en la PC y en la Nube.</p>
            </div>
            <div class="card">
                <h3 id="txt-resumen">Clientes Activos</h3>
                <table id="dash-list"></table>
            </div>
        </div>

        <!-- CLIENTES -->
        <div class="page" id="page-clientes">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <h2 id="txt-cli-title">Directorio</h2>
                <button class="btn btn-primary" id="btn-new" onclick="window.openModalCliente()">+ Nuevo</button>
            </div>
            <div class="card"><table id="tabla-list"></table></div>
        </div>

        <!-- IA -->
        <div class="page" id="page-ia">
            <div class="card">
                <h2>🤖 Soporte Claude IA</h2>
                <div id="chat-box" style="height:250px; overflow-y:auto; background:#f9f9f9; padding:15px; border:1px solid #ddd; margin:15px 0; border-radius:10px">
                    <p><b>Claude:</b> ¡Hola! ¿En qué puedo ayudarte con la Ley 6380/19 hoy?</p>
                </div>
                <div style="display:flex; gap:10px">
                    <input type="text" id="chat-input" placeholder="Escribe tu duda contable...">
                    <button class="btn btn-secondary" onclick="window.preguntarIA()">Preguntar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <h3 id="txt-modal-title">Datos del Cliente</h3>
        <input type="text" id="cli_ruc" placeholder="RUC">
        <input type="text" id="cli_nom" placeholder="Razón Social">
        <div style="text-align:right; margin-top:20px">
            <button class="btn" style="background:#ccc" onclick="window.closeModal()">Cancelar</button>
            <button class="btn btn-primary" id="btn-save" onclick="window.guardarCliente()">💾 Guardar</button>
        </div>
    </div>
</div>

<script>
    window.dbClientes = JSON.parse(localStorage.getItem('contapy_v41')) || [];

    // IDIOMAS (Lógica mejorada)
    window.changeLang = function(lang) {
        localStorage.setItem('contapy_lang', lang);
        var d = {
            es: { top: "Dashboard v4.1", welcome: "Bienvenido 👋", sub: "Datos en PC y Nube.", resumen: "Clientes Activos", cli: "Directorio", modal: "Datos del Cliente", save: "💾 Guardar", new: "+ Nuevo" },
            en: { top: "Dashboard v4.1", welcome: "Welcome 👋", sub: "Data on PC and Cloud.", resumen: "Active Clients", cli: "Directory", modal: "Client Details", save: "💾 Save", new: "+ New" },
            pt: { top: "Painel v4.1", welcome: "Bem-vindo 👋", sub: "Dados no PC e Nuvem.", resumen: "Clientes Ativos", cli: "Diretório", modal: "Dados do Cliente", save: "💾 Salvar", new: "+ Novo" }
        };
        var s = d[lang] || d.es;
        document.getElementById('txt-top').innerText = s.top;
        document.getElementById('txt-welcome').innerText = s.welcome;
        document.getElementById('txt-sub').innerText = s.sub;
        document.getElementById('txt-resumen').innerText = s.resumen;
        document.getElementById('txt-cli-title').innerText = s.cli;
        document.getElementById('txt-modal-title').innerText = s.modal;
        document.getElementById('btn-save').innerText = s.save;
        document.getElementById('btn-new').innerText = s.new;
    };

    window.showPage = function(p, el) {
        document.getElementById('page-dashboard').className = 'page';
        document.getElementById('page-clientes').className = 'page';
        document.getElementById('page-ia').className = 'page';
        document.getElementById('page-' + p).className = 'page active';
        
        document.getElementById('m-dash').className = 'nav-item';
        document.getElementById('m-cli').className = 'nav-item';
        document.getElementById('m-ia').className = 'nav-item';
        el.className = 'nav-item active';
    };

    window.openModalCliente = function() {
        document.getElementById('cli_ruc').value = "";
        document.getElementById('cli_nom').value = "";
        document.getElementById('modal-cliente').className = "modal-overlay open";
        setTimeout(function(){ document.getElementById('cli_ruc').focus(); }, 400);
    };

    window.closeModal = function() { document.getElementById('modal-cliente').className = "modal-overlay"; };

    window.guardarCliente = function() {
        var r = document.getElementById('cli_ruc').value;
        var n = document.getElementById('cli_nom').value;
        if(!r || !n) return alert("Faltan datos");
        window.dbClientes.push({ ruc: r, nom: n });
        localStorage.setItem('contapy_v41', JSON.stringify(window.dbClientes));
        window.render();
        window.closeModal();
    };

    window.render = function() {
        var t = document.getElementById('tabla-list');
        var d = document.getElementById('dash-list');
        t.innerHTML = ""; d.innerHTML = "";
        for(var i=0; i < window.dbClientes.length; i++) {
            var c = window.dbClientes[i];
            t.innerHTML += '<tr><td>'+c.ruc+'</td><td>'+c.nom+'</td><td>OK</td></tr>';
            d.innerHTML += '<tr><td><b>'+c.ruc+'</b></td><td>'+c.nom+'</td></tr>';
        }
    };

    window.preguntarIA = function() {
        var msg = document.getElementById('chat-input').value;
        if(!msg) return;
        var box = document.getElementById('chat-box');
        box.innerHTML += '<p style="text-align:right"><b>Tú:</b> '+msg+'</p>';
        document.getElementById('chat-input').value = "";
        setTimeout(function(){
            box.innerHTML += '<p style="color:blue"><b>Claude IA:</b> Analizando tu consulta sobre "'+msg+'" en la Ley 6380...</p>';
            box.scrollTop = box.scrollHeight;
        }, 500);
    };

    // FIREBASE
    var config = {
        apiKey: "AIzaSyBn3tcXb3WpVojYmMX603L68jhOqzW8abg",
        authDomain: "contapy-f85f9.firebaseapp.com",
        projectId: "contapy-f85f9",
        storageBucket: "contapy-f85f9.firebasestorage.app",
        messagingSenderId: "230770781636",
        appId: "1:230770781636:web:5114af83fb351c15b68891"
    };
    firebase.initializeApp(config);

    window.doLogin = function() {
        var u = document.getElementById('lu').value;
        var p = document.getElementById('lp').value;
        firebase.auth().signInWithEmailAndPassword(u, p).catch(function(e){
            document.getElementById('l-msg').innerText = "Usuario o Clave incorrectos.";
        });
    };

    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            document.getElementById('login-wrap').style.display = 'none';
            window.render();
            var l = localStorage.getItem('contapy_lang') || 'es';
            document.getElementById('lang_sel').value = l;
            window.changeLang(l);
        } else {
            document.getElementById('login-wrap').style.display = 'flex';
        }
    });
</script>
</body>
</html>
