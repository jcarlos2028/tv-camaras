<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaPY v1.1 — Sistema Contable Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;--sidebar:#0f1923;--sidebar-hover:#1a2535;--accent:#e63946;
  --accent2:#2196f3;--white:#fff;--card:#fff;--text:#1a1a2e;--text-light:#6b7280;
  --border:#e5e7eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* CORRECCIÓN DE INTERACCIÓN: Permitir clics en toda la app */
input, select, textarea, button, .nav-item, .tab {
    pointer-events: auto !important;
    -webkit-app-region: no-drag; /* Evita que el drag de ventana bloquee el clic */
}

.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;z-index:100;}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-text{color:white;font-size:17px;font-weight:700;}
.sidebar-section{padding:12px 10px}
.sidebar-label{color:rgba(255,255,255,.25);font-size:10px;font-weight:600;text-transform:uppercase;margin-bottom:5px}

.nav-item{display:flex;align-items:center;gap:9px;padding:10px;border-radius:7px;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;transition:0.2s}
.nav-item:hover{background:var(--sidebar-hover);color:white}
.nav-item.active{background:var(--accent);color:white}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.content{flex:1;overflow-y:auto;padding:20px;}

.page{display:none} .page.active{display:block}

/* MODALES CORREGIDOS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:12px;width:500px;max-width:95%;box-shadow:var(--shadow);overflow:hidden;}
.modal-header{padding:15px;background:var(--bg);display:flex;justify-content:space-between;font-weight:700;}
.modal-body{padding:20px;}

.form-group{margin-bottom:15px;display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase}
input, select{padding:10px;border:1px solid var(--border);border-radius:6px;outline:none;width:100%}

.btn{padding:10px 16px;border-radius:6px;cursor:pointer;border:none;font-weight:600;font-size:13px;}
.btn-primary{background:var(--accent);color:white}
.btn-outline{background:transparent;border:1px solid var(--border)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">ContaPY v1.1</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label" data-i18n="menu_main">Principal</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)"><span data-i18n="nav_dash">Dashboard</span></div>
    <div class="nav-item" onclick="showPage('clientes',this)"><span data-i18n="nav_clients">Clientes (Cartera)</span></div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div id="topbar-title" style="font-weight:700" data-i18n="nav_dash">Dashboard</div>
    <select id="lang_sel" onchange="changeLang(this.value)">
      <option value="es">🇪🇸 Español</option>
      <option value="en">🇺🇸 English</option>
      <option value="pt">🇧🇷 Português</option>
    </select>
  </div>

  <div class="content">
    <div class="page active" id="page-dashboard">
      <h2 data-i18n="dash_h2">Estudio Contable ContaPY 👋</h2>
      <p style="color:var(--text-light); margin-bottom: 20px;">Bienvenido al panel de control.</p>
    </div>

    <div class="page" id="page-clientes">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px">
        <h2 data-i18n="nav_clients">Directorio de Clientes</h2>
        <button class="btn btn-primary" onclick="openModal()">+ Nuevo Cliente</button>
      </div>
      <div style="background:white; padding:20px; border-radius:10px; border:1px solid var(--border)">
        <p data-i18n="cli_p">Registro de contribuyentes activos.</p>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-header">
      <span>Registrar Cliente</span>
      <span style="cursor:pointer" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>RUC</label>
        <input type="text" id="ruc_input" placeholder="Ej: 80012345-0">
      </div>
      <div class="form-group">
        <label data-i18n="tbl_name">Razón Social</label>
        <input type="text" id="nombre_input" placeholder="Nombre de la empresa">
      </div>
      <div style="display:flex; justify-content:flex-end; gap:10px">
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="alert('Guardado exitosamente')">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
// LÓGICA DE NAVEGACIÓN
function showPage(pageId, element) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    if(element) element.classList.add('active');
}

// LÓGICA DE MODALES
function openModal() { document.getElementById('modal-cliente').classList.add('open'); }
function closeModal() { document.getElementById('modal-cliente').classList.remove('open'); }

// LÓGICA DE IDIOMAS
const traducciones = {
    es: {
        menu_main: "Principal",
        nav_dash: "Dashboard",
        nav_clients: "Clientes (Cartera)",
        dash_h2: "Estudio Contable ContaPY 👋",
        tbl_name: "Razón Social / Nombre",
        cli_p: "Registro de contribuyentes activos."
    },
    en: {
        menu_main: "Main Menu",
        nav_dash: "Dashboard",
        nav_clients: "Clients (Portfolio)",
        dash_h2: "ContaPY Accounting Firm 👋",
        tbl_name: "Business Name",
        cli_p: "Active taxpayers registry."
    },
    pt: {
        menu_main: "Principal",
        nav_dash: "Painel",
        nav_clients: "Clientes (Carteira)",
        dash_h2: "Escritório Contábil ContaPY 👋",
        tbl_name: "Razão Social",
        cli_p: "Registro de contribuintes ativos."
    }
};

function changeLang(lang) {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const clave = el.getAttribute('data-i18n');
        if (traducciones[lang][clave]) {
            el.innerText = traducciones[lang][clave];
        }
    });
}
</script>

</body>
</html>
