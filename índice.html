<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaPY v4.5 — Test de Edición Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f0f2f5;--sidebar:#0f1923;--accent:#e63946;--accent2:#2196f3;
  --white:#fff;--text:#1a1a2e;--text-light:#6b7280;--border:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

/* Sidebar Estilo V1 */
.sidebar { width:240px; background:var(--sidebar); display:flex; flex-direction:column; color:white; }
.sidebar-logo { padding:20px; border-bottom:1px solid rgba(255,255,255,.1); font-weight:bold; }
.nav-item { padding:12px 20px; cursor:pointer; font-size:14px; color:rgba(255,255,255,.6); transition:0.2s; }
.nav-item:hover, .nav-item.active { background:var(--accent); color:white; }

.main { flex:1; display:flex; flex-direction:column; }
.topbar { background:white; height:56px; display:flex; align-items:center; padding:0 20px; border-bottom:1px solid var(--border); font-weight:bold; }
.content { padding:20px; overflow-y:auto; flex:1; }

.page { display:none; } .page.active { display:block; }
.card { background:white; padding:20px; border-radius:10px; box-shadow:var(--shadow); margin-bottom:20px; }

/* Tablas y Formularios */
table { width:100%; border-collapse:collapse; margin-top:10px; }
th { text-align:left; font-size:12px; color:var(--text-light); padding:10px; border-bottom:2px solid var(--border); }
td { padding:12px 10px; border-bottom:1px solid var(--border); font-size:14px; }
input { width:100%; padding:8px; margin:5px 0 15px; border:1px solid var(--border); border-radius:6px; }

.btn { padding:8px 16px; border-radius:6px; cursor:pointer; border:none; font-weight:600; font-size:13px; }
.btn-primary { background:var(--accent); color:white; }
.btn-secondary { background:var(--accent2); color:white; }

/* Modales */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; padding:25px; border-radius:12px; width:400px; box-shadow:0 10px 25px rgba(0,0,0,.2); }

.login-wrap { position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:9999; }
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
    <div class="card" style="width:350px; text-align:center;">
        <h2 style="margin-bottom:20px;">ContaPY Cloud</h2>
        <div style="text-align:left;">
            <label>Email</label><input type="text" id="lu" placeholder="usuario@correo.com">
            <label>Contraseña</label><input type="password" id="lp">
        </div>
        <button class="btn btn-primary" style="width:100%" id="btn-login">Entrar</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-logo">🧾 ContaPY v4.5</div>
    <div class="nav-item active" onclick="showPage('dashboard', this)">🏠 Dashboard</div>
    <div class="nav-item" onclick="showPage('clientes', this)">🏢 Clientes</div>
    <div style="margin-top:auto; padding:20px;">
        <button class="btn btn-primary" style="width:100%" id="btn-logout">Cerrar Sesión</button>
    </div>
</div>

<div class="main">
    <div class="topbar" id="topbar-title">Dashboard</div>
    <div class="content">
        
        <div class="page active" id="page-dashboard">
            <h2>Resumen de Cartera</h2>
            <div class="card" style="margin-top:20px;">
                <p>Clientes totales en la nube:</p>
                <h1 id="dash-count">0</h1>
            </div>
        </div>

        <div class="page" id="page-clientes">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Directorio de Clientes</h2>
                <button class="btn btn-primary" onclick="openModalCliente()">+ Nuevo Cliente</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>RUC</th><th>Nombre / Razón Social</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-clientes"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <h3 id="modal-title">Nuevo Cliente</h3>
        <input type="hidden" id="edit-index">
        <label>RUC</label><input type="text" id="cli-ruc" placeholder="123456-0">
        <label>Nombre</label><input type="text" id="cli-nom" placeholder="Juan Perez">
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-secondary" id="btn-save">Guardar en Nube</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3tcXb3WpVojYmMX603L68jhOqzW8abg",
        authDomain: "contapy-f85f9.firebaseapp.com",
        projectId: "contapy-f85f9",
        storageBucket: "contapy-f85f9.firebasestorage.app",
        messagingSenderId: "230770781636",
        appId: "1:230770781636:web:5114af83fb351c15b68891"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.dbClientes = [];

    // --- NAVEGACIÓN ---
    window.showPage = (name, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        document.getElementById('topbar-title').innerText = name.toUpperCase();
    };

    // --- LÓGICA DE CLIENTES (CREAR Y EDITAR) ---
    window.openModalCliente = (index = -1) => {
        const modal = document.getElementById('modal-cliente');
        const title = document.getElementById('modal-title');
        const inRuc = document.getElementById('cli-ruc');
        const inNom = document.getElementById('cli-nom');
        const inIdx = document.getElementById('edit-index');

        if(index === -1) {
            title.innerText = "Nuevo Cliente";
            inRuc.value = ""; inNom.value = ""; inIdx.value = "-1";
        } else {
            title.innerText = "Editar Cliente";
            const c = window.dbClientes[index];
            inRuc.value = c.ruc; inNom.value = c.nom; inIdx.value = index;
        }
        modal.classList.add('open');
    };

    window.closeModal = () => document.getElementById('modal-cliente').classList.remove('open');

    document.getElementById('btn-save').onclick = async () => {
        const ruc = document.getElementById('cli-ruc').value;
        const nom = document.getElementById('cli-nom').value;
        const idx = parseInt(document.getElementById('edit-index').value);

        if(!ruc || !nom) return alert("Completa los campos");

        if(idx === -1) {
            // Crear nuevo
            window.dbClientes.push({ ruc, nom, libros: { compras:[], ventas:[] } });
        } else {
            // Editar existente
            window.dbClientes[idx].ruc = ruc;
            window.dbClientes[idx].nom = nom;
        }

        // GUARDAR EN FIREBASE (Cerebro V4)
        await setDoc(doc(db, "sistema", "datos_principales"), { clientes: window.dbClientes });
        
        renderClientes();
        closeModal();
    };

    function renderClientes() {
        const list = document.getElementById('lista-clientes');
        list.innerHTML = "";
        window.dbClientes.forEach((c, i) => {
            list.innerHTML += `
                <tr>
                    <td>${c.ruc}</td>
                    <td><b>${c.nom}</b></td>
                    <td>
                        <button class="btn btn-secondary" onclick="window.openModalCliente(${i})">✏️ Editar</button>
                    </td>
                </tr>`;
        });
        document.getElementById('dash-count').innerText = window.dbClientes.length;
    }

    // --- AUTENTICACIÓN ---
    document.getElementById('btn-login').onclick = async () => {
        const u = document.getElementById('lu').value;
        const p = document.getElementById('lp').value;
        try { await signInWithEmailAndPassword(auth, u, p); } catch(e) { alert("Error"); }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-wrap').style.display = 'none';
            // Cargar datos al entrar
            const snap = await getDoc(doc(db, "sistema", "datos_principales"));
            if (snap.exists()) window.dbClientes = snap.data().clientes || [];
            renderClientes();
        } else {
            document.getElementById('login-wrap').style.display = 'flex';
        }
    });
</script>
</body>
</html>
