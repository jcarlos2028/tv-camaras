<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaPY v4.0 — Sistema Contable Cloud + Claude IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;--sidebar:#0f1923;--sidebar-hover:#1a2535;--accent:#e63946;
  --accent2:#2196f3;--white:#fff;--card:#fff;--text:#1a1a2e;--text-light:#6b7280;
  --border:#e5e7eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}

/* --- CORRECCIÓN CRÍTICA: DESBLOQUEO DE INPUTS --- */
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
  overflow:hidden;
  -webkit-app-region: drag; /* Mantiene la app arrastrable */
}

/* Permitir interacción en todos los elementos de carga de datos */
input, select, textarea, button, .nav-item, .tab, .win-btn, [onclick], .modal-body, .modal-drag-header {
  -webkit-app-region: no-drag !important;
  pointer-events: auto !important;
}

input, select, textarea {
  user-select: text !important;
  -webkit-user-select: text !important;
  cursor: text;
}
/* ----------------------------------------------- */

.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;z-index:100;}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-text{color:white;font-size:17px;font-weight:700;}
.sidebar-section{padding:12px 10px 2px}
.sidebar-label{color:rgba(255,255,255,.25);font-size:10px;font-weight:600;text-transform:uppercase;margin-bottom:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;transition:all .15s}
.nav-item:hover{background:var(--sidebar-hover);color:white}
.nav-item.active{background:var(--accent);color:white}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.content{flex:1;overflow-y:auto;padding:20px;}
.page{display:none} .page.active{display:block}

.card{background:var(--card);border-radius:10px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:18px}
.form-group{margin-bottom:15px;display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase}
input, select{padding:10px;border:1px solid var(--border);border-radius:6px;outline:none;width:100%}
.btn{padding:10px 16px;border-radius:6px;cursor:pointer;border:none;font-weight:600;font-size:13px;}
.btn-primary{background:var(--accent);color:white}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:90%;max-width:500px;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-header{padding:15px;background:var(--bg);display:flex;justify-content:space-between;font-weight:700;border-bottom:1px solid var(--border)}
.modal-body{padding:20px}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1 style="text-align:center; margin-bottom:20px">ContaPY v4.0</h1>
    <div class="form-group"><label>Usuario</label><input type="text" id="lu"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="lp"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-logo"><div class="logo-text">🧾 ContaPY v4.0</div></div>
  <div class="sidebar-section">
    <div class="sidebar-label" data-i18n="menu_main">Principal</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)">🏠 <span data-i18n="nav_dash">Dashboard</span></div>
    <div class="nav-item" onclick="showPage('clientes',this)">🏢 <span data-i18n="nav_clients">Clientes</span></div>
  </div>
  </div>

<div class="main">
  <div class="topbar">
    <div id="topbar-title" style="font-weight:700" data-i18n="nav_dash">Dashboard</div>
    <select id="lang_sel" onchange="changeLang(this.value)" style="width:auto">
      <option value="es">🇪🇸 ES</option>
      <option value="en">🇺🇸 EN</option>
      <option value="pt">🇧🇷 PT</option>
    </select>
  </div>

  <div class="content">
    <div class="page active" id="page-dashboard">
      <h2 data-i18n="dash_h2">Estudio Contable ContaPY 👋</h2>
      <p>Sincronización en la nube lista.</p>
    </div>

    <div class="page" id="page-clientes">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 data-i18n="nav_clients">Directorio de Clientes</h2>
        <button class="btn btn-primary" onclick="openModal()">+ Nuevo Cliente</button>
      </div>
      <div class="card" id="lista-clientes">
        </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-header">
      <span>Registrar Cliente</span>
      <span style="cursor:pointer" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>RUC / Documento</label>
        <input type="text" id="ruc_input" placeholder="Ingrese RUC">
      </div>
      <div class="form-group">
        <label data-i18n="tbl_name">Nombre / Razón Social</label>
        <input type="text" id="nombre_input" placeholder="Nombre completo">
      </div>
      <div style="display:flex; justify-content:flex-end; gap:10px">
        <button class="btn" style="background:#eee" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveData()">Guardar Datos</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
// --- TU CONFIGURACIÓN DE FIREBASE ORIGINAL ---
// (Aquí debe ir tu initializeApp, auth, db, etc.)

// --- CORRECCIÓN DE IDIOMAS ---
const traducciones = {
    es: { nav_dash: "Dashboard", nav_clients: "Clientes", dash_h2: "Estudio Contable ContaPY 👋", tbl_name: "Razón Social / Nombre", menu_main: "Principal" },
    en: { nav_dash: "Main Panel", nav_clients: "Client List", dash_h2: "Accounting Office ContaPY 👋", tbl_name: "Business Name", menu_main: "Main Menu" },
    pt: { nav_dash: "Painel", nav_clients: "Clientes", dash_h2: "Escritório Contábil ContaPY 👋", tbl_name: "Razão Social", menu_main: "Principal" }
};

window.changeLang = function(lang) {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (traducciones[lang][key]) el.innerText = traducciones[lang][key];
    });
};

// --- NAVEGACIÓN Y MODALES ---
window.showPage = function(page, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(el) el.classList.add('active');
};

window.openModal = function() { document.getElementById('modal-cliente').classList.add('open'); };
window.closeModal = function() { document.getElementById('modal-cliente').classList.remove('open'); };

// --- TU LÓGICA DE LOGIN Y GUARDADO ORIGINAL ---
window.doLogin = function() {
    // Tu lógica original de Auth
    document.getElementById('login-wrap').style.display = 'none';
};

window.saveData = function() {
    const ruc = document.getElementById('ruc_input').value;
    const nombre = document.getElementById('nombre_input').value;
    console.log("Guardando en Firebase:", ruc, nombre);
    // Tu lógica original de set(ref(db...))
    closeModal();
};
</script>

</body>
</html>
