<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaPY v5.2 — Premium Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Firebase v8 para máxima compatibilidad con Windows -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
:root {
  --bg:#f0f2f5;--sidebar:#0f1923;--accent:#e63946;--accent2:#2196f3;
  --white:#fff;--text:#1a1a2e;--border:#e5e7eb;
}
/* ANTI-BLOQUEO EXE: Desactivar arrastre que impide escribir */
* { box-sizing:border-box; margin:0; padding:0; -webkit-app-region: no-drag; }
body { font-family:'DM Sans', sans-serif; background:var(--bg); display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR ORIGINAL PREMIUM */
.sidebar { width:240px; background:var(--sidebar); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-logo { padding:20px; border-bottom:1px solid rgba(255,255,255,.06); -webkit-app-region: drag; }
.logo-icon { width:34px; height:34px; background:var(--accent); border-radius:8px; display:inline-flex; align-items:center; justify-content:center; margin-right:10px; color:white; font-weight:bold; }
.nav-item { display:flex; align-items:center; gap:10px; padding:12px 20px; color:rgba(255,255,255,.6); cursor:pointer; font-size:13px; transition:0.2s; }
.nav-item:hover, .nav-item.active { background:var(--accent); color:white; opacity:1; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { background:var(--white); border-bottom:1px solid var(--border); height:56px; display:flex; align-items:center; padding:0 20px; -webkit-app-region: drag; }
.topbar-title { flex:1; font-weight:700; -webkit-app-region: drag; }
.topbar select { -webkit-app-region: no-drag; padding:5px; border-radius:5px; border:1px solid #ddd; outline:none; }

.content { flex:1; overflow-y:auto; padding:20px; }
.page { display:none; } .page.active { display:block; }

.card { background:var(--white); border-radius:12px; padding:20px; box-shadow:0 4px 12px rgba(0,0,0,.05); border:1px solid var(--border); margin-bottom:20px; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; padding:12px; border-bottom:2px solid var(--border); color:#6b7280; text-transform:uppercase; font-size:11px; }
td { padding:12px; border-bottom:1px solid var(--border); font-size:14px; }

/* FORMULARIOS PARA EXE: Forzar interacción */
.form-group { margin-bottom:15px; }
label { display:block; font-size:12px; font-weight:700; margin-bottom:5px; color:#4b5563; }
input { 
    width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; outline:none; 
    background:white !important; color:black !important;
    pointer-events: auto !important; 
    -webkit-user-select: text !important;
    user-select: text !important;
}

.btn { padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer; border:none; transition:0.2s; }
.btn-primary { background:var(--accent); color:white; }

/* MODALES */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:16px; width:90%; max-width:450px; padding:30px; box-shadow:0 10px 50px rgba(0,0,0,0.3); }

/* LOGIN */
.login-wrap { position:fixed; inset:0; background:var(--sidebar); z-index:10000; display:flex; align-items:center; justify-content:center; }
.login-card { background:white; padding:45px; border-radius:24px; width:380px; text-align:center; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="logo-icon" style="width:60px; height:60px; font-size:30px; margin:0 auto 20px">☁️</div>
    <h2 style="margin-bottom:10px">ContaPY Access</h2>
    <p style="font-size:12px; color:#6b7280; margin-bottom:20px">Inicie sesión para acceder a su PC</p>
    <div class="form-group"><input type="text" id="lu" placeholder="Usuario"></div>
    <div class="form-group"><input type="password" id="lp" placeholder="Contraseña"></div>
    <button class="btn btn-primary" style="width:100%" onclick="window.doLogin()">Ingresar</button>
    <p id="l-msg" style="color:red; font-size:12px; margin-top:15px"></p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🧾</div><span style="color:white; font-weight:700">ContaPY Cloud</span>
  </div>
  <div class="nav-item active" id="btn-dash" onclick="showPage('dashboard', this)">🏠 <span data-i18n="nav_dash">Dashboard</span></div>
  <div class="nav-item" id="btn-cli" onclick="showPage('clientes', this)">🏢 <span data-i18n="nav_clients">Clientes</span></div>
  <div style="margin-top:auto; padding:20px">
    <button class="btn" style="width:100%; background:rgba(255,255,255,0.1); color:white" onclick="location.reload()">Cerrar Sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="txt-topbar" data-i18n="top_title">Dashboard Principal</div>
    <select id="lang_sel" onchange="window.changeLang(this.value)">
      <option value="es">🇪🇸 ES</option>
      <option value="en">🇺🇸 EN</option>
      <option value="pt">🇧🇷 PT</option>
    </select>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <h2 data-i18n="dash_h2">Estudio Contable ContaPY 👋</h2>
      <p style="color:#6b7280; margin-bottom:20px">Los datos se guardan de forma segura en este equipo.</p>
      <div class="card">
        <h3 data-i18n="dash_t1">Acceso Rápido</h3>
        <table>
          <thead><tr><th>RUC</th><th data-i18n="tbl_name">Razón Social</th></tr></thead>
          <tbody id="dash-list"></tbody>
        </table>
      </div>
    </div>

    <!-- CLIENTES -->
    <div class="page" id="page-clientes">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 data-i18n="cli_h2">Directorio de Clientes</h2>
        <button class="btn btn-primary" onclick="window.openModalCliente()">+ <span data-i18n="nav_new">Nuevo</span></button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>RUC</th><th data-i18n="tbl_name">Nombre</th><th data-i18n="tbl_actions">Acción</th></tr></thead>
          <tbody id="tabla-list"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <h3 id="txt-modal-title">Datos del Cliente</h3>
    <div class="form-group"><label>RUC / Cédula:</label><input type="text" id="cli_ruc"></div>
    <div class="form-group"><label>Nombre / Razón Social:</label><input type="text" id="cli_nom"></div>
    <div style="text-align:right; margin-top:20px">
      <button class="btn" style="background:#eee; margin-right:10px" onclick="window.closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="window.guardarCliente()">💾 Guardar en PC</button>
    </div>
  </div>
</div>

<script>
    // CARGA LOCAL (PC)
    window.dbClientes = JSON.parse(localStorage.getItem('contapy_db_v52')) || [];

    // --- IDIOMAS CORREGIDOS ---
    var translations = {
        es: { nav_dash:"Dashboard", nav_clients:"Clientes", top_title:"Dashboard Principal", dash_h2:"Estudio Contable ContaPY 👋", dash_t1:"Acceso Rápido", cli_h2:"Directorio de Clientes", nav_new:"Nuevo", tbl_name:"Razón Social", tbl_actions:"Acción" },
        en: { nav_dash:"Dashboard", nav_clients:"Clients", top_title:"Main Dashboard", dash_h2:"ContaPY Accounting 👋", dash_t1:"Quick Access", cli_h2:"Client Directory", nav_new:"New", tbl_name:"Legal Name", tbl_actions:"Action" },
        pt: { nav_dash:"Painel", nav_clients:"Clientes", top_title:"Painel Principal", dash_h2:"Estúdio Contábil ContaPY 👋", dash_t1:"Acesso Rápido", cli_h2:"Diretório de Clientes", nav_new:"Novo", tbl_name:"Razão Social", tbl_actions:"Ações" }
    };

    window.changeLang = function(lang) {
        localStorage.setItem('contapy_lang', lang);
        var t = translations[lang] || translations.es;
        var elements = document.querySelectorAll('[data-i18n]');
        for(var i=0; i<elements.length; i++) {
            var key = elements[i].getAttribute('data-i18n');
            if(t[key]) elements[i].innerText = t[key];
        }
        document.getElementById('txt-topbar').innerText = t.top_title;
    };

    // --- INTERFAZ ---
    window.showPage = function(name, el) {
        document.getElementById('page-dashboard').className = 'page';
        document.getElementById('page-clientes').className = 'page';
        document.getElementById('page-' + name).className = 'page active';
        
        document.getElementById('btn-dash').className = 'nav-item';
        document.getElementById('btn-cli').className = 'nav-item';
        el.className = 'nav-item active';
    };

    window.openModalCliente = function() {
        document.getElementById('cli_ruc').value = "";
        document.getElementById('cli_nom').value = "";
        document.getElementById('modal-cliente').className = "modal-overlay open";
        setTimeout(function(){ document.getElementById('cli_ruc').focus(); }, 400);
    };

    window.closeModal = function() { document.getElementById('modal-cliente').className = "modal-overlay"; };

    window.guardarCliente = function() {
        var r = document.getElementById('cli_ruc').value.trim();
        var n = document.getElementById('cli_nom').value.trim();
        if(!r || !n) return alert("Complete los campos.");
        window.dbClientes.push({ ruc:r, nom:n });
        localStorage.setItem('contapy_db_v52', JSON.stringify(window.dbClientes));
        window.render();
        window.closeModal();
    };

    window.render = function() {
        var t = document.getElementById('tabla-list');
        var d = document.getElementById('dash-list');
        t.innerHTML = ""; d.innerHTML = "";
        for(var i=0; i < window.dbClientes.length; i++) {
            var c = window.dbClientes[i];
            t.innerHTML += '<tr><td>'+c.ruc+'</td><td>'+c.nom+'</td><td>OK</td></tr>';
            d.innerHTML += '<tr><td><b>'+c.ruc+'</b></td><td>'+c.nom+'</td></tr>';
        }
    };

    // --- FIREBASE LOGIN ---
    var config = {
        apiKey: "AIzaSyBn3tcXb3WpVojYmMX603L68jhOqzW8abg",
        authDomain: "contapy-f85f9.firebaseapp.com",
        projectId: "contapy-f85f9",
        storageBucket: "contapy-f85f9.firebasestorage.app",
        messagingSenderId: "230770781636",
        appId: "1:230770781636:web:5114af83fb351c15b68891"
    };
    firebase.initializeApp(config);

    window.doLogin = function() {
        var u = document.getElementById('lu').value;
        var p = document.getElementById('lp').value;
        firebase.auth().signInWithEmailAndPassword(u, p).catch(function(e){
            document.getElementById('l-msg').innerText = "Credenciales incorrectas.";
        });
    };

    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            document.getElementById('login-wrap').style.display = 'none';
            window.render();
            var l = localStorage.getItem('contapy_lang') || 'es';
            document.getElementById('lang_sel').value = l;
            window.changeLang(l);
        } else {
            document.getElementById('login-wrap').style.display = 'flex';
        }
    });
</script>
</body>
</html>
