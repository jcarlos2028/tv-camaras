<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaPY v4.0 — Sistema Contable Cloud + Claude IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;--sidebar:#0f1923;--sidebar-hover:#1a2535;--accent:#e63946;
  --accent2:#2196f3;--white:#fff;--card:#fff;--text:#1a1a2e;--text-light:#6b7280;
  --border:#e5e7eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}

/* --- CORRECCIÓN DE BLOQUEO DE INPUTS --- */
body {
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* Asegurar que los campos de texto sean siempre interactuables */
input, select, textarea, button {
    -webkit-app-region: no-drag !important;
    pointer-events: auto !important;
    user-select: text !important;
    -webkit-user-select: text !important;
}

/* Estilos de la Interfaz */
.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;z-index:100;transition:all 0.3s;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{color:white;font-size:17px;font-weight:700;letter-spacing:-.5px}
.logo-sub{color:rgba(255,255,255,.3);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.sidebar-section{padding:12px 10px 2px}
.sidebar-label{color:rgba(255,255,255,.25);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:0 8px;margin-bottom:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--accent);color:white}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.content{flex:1;overflow-y:auto;padding:20px;position:relative;}
.page{display:none} .page.active{display:block}
.card{background:var(--card);border-radius:10px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:18px}
.form-group{display:flex;flex-direction:column;gap:5px}
input,select,textarea{padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none;}

/* Estilos de Modales y Dragging */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;overflow:hidden}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:90%;max-width:680px;box-shadow:var(--shadow-lg);position:absolute;display:flex;flex-direction:column;max-height:88vh;}
.modal-drag-header{background:var(--bg);padding:10px 15px;cursor:move;display:flex;align-items:center;justify-content:space-between;border-radius:14px 14px 0 0;user-select:none;border-bottom:1px solid var(--border)}
.win-controls{display:flex;gap:6px}
.win-btn{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--white);border:1px solid var(--border)}
.modal-body-scroll{padding:24px;overflow-y:auto;flex:1}
</style>
</head>
<body>

<datalist id="planCuentasRes4814"></datalist>

<div class="login-wrap" id="login-wrap">
  <div class="login-card" id="login-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px">☁️</div>
      <h1>ContaPY</h1>
      <p>Autenticación Segura</p>
    </div>
    <div class="form-group"><label>Usuario</label><input type="text" id="lu" placeholder="ejemplo@correo.com"></div>
    <div class="form-group" style="margin-top:10px"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••"></div>
    <button class="btn btn-primary" style="width:100%; margin-top:15px" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark"><div class="logo-icon">🧾</div><div><div class="logo-text">ContaPY</div><div class="logo-sub">v4.0 Cloud</div></div></div>
  </div>
  <div class="sidebar-section">
    <div class="nav-item active" onclick="showPage('dashboard',this)">🏠 Dashboard</div>
    <div class="nav-item" onclick="showPage('clientes',this)">🏢 Clientes</div>
    <div class="nav-item" onclick="showPage('iva',this)">📊 IVA (120)</div>
    <div class="nav-item" onclick="showPage('gemini',this)" style="color:#f59e0b">🤖 Claude IA</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard Principal</div>
    <div class="btn-icon" onclick="doLogout()">🚪</div>
  </div>

  <div class="content">
    <div class="page active" id="page-dashboard">
      <h2>Estudio Contable 👋</h2>
      <div class="card">
        <p>Bienvenido al sistema. Los datos están sincronizados.</p>
      </div>
    </div>

    <div class="page" id="page-gemini">
      <h2>🤖 Soporte Claude IA</h2>
      <div class="card">
        <div id="chat_box" style="height:300px; overflow-y:auto; margin-bottom:10px; background:#f8f9fa; padding:10px"></div>
        <div style="display:flex; gap:10px">
          <input type="text" id="chat_input" placeholder="Pregunta sobre impuestos..." style="flex:1">
          <button class="btn btn-primary" onclick="enviarMensajeIA()">Enviar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-drag-header">
      <span class="m-title">Configurar Cliente</span>
      <div class="win-controls"><div class="win-btn" onclick="closeModal('modal-cliente')">✕</div></div>
    </div>
    <div class="modal-body-scroll">
      <div class="form-group">
        <label>RUC</label>
        <input type="text" id="cli_ruc" placeholder="Ingrese RUC">
      </div>
      <div class="form-group" style="margin-top:10px">
        <label>Nombre</label>
        <input type="text" id="cli_nom" placeholder="Razón Social">
      </div>
      <button class="btn btn-primary" style="margin-top:20px" onclick="alert('Guardado!')">Guardar Datos</button>
    </div>
  </div>
</div>

<script>
// --- LÓGICA DE NAVEGACIÓN ---
window.showPage = function(page, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(el) el.classList.add('active');
    document.getElementById('topbar-title').innerText = page.toUpperCase();
};

window.openModal = function(id) { document.getElementById(id).classList.add('open'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };

// --- CORRECCIÓN DRAGGING (PARA NO BLOQUEAR INPUTS) ---
function makeDraggable(ov) {
    var modal = ov.querySelector('.modal');
    var header = ov.querySelector('.modal-drag-header');
    if(!header || !modal) return;

    var isDragging = false;
    var offsetX, offsetY;

    header.addEventListener('mousedown', function(e) {
        if(e.target.closest('.win-btn')) return; // No arrastrar si pulsa botones de control
        isDragging = true;
        offsetX = e.clientX - modal.offsetLeft;
        offsetY = e.clientY - modal.offsetTop;
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        modal.style.left = (e.clientX - offsetX) + 'px';
        modal.style.top = (e.clientY - offsetY) + 'px';
        modal.style.position = 'absolute';
        modal.style.margin = '0';
    });

    document.addEventListener('mouseup', function() {
        isDragging = false;
        document.body.style.userSelect = '';
    });
}

// Inicializar modales
document.querySelectorAll('.modal-overlay').forEach(makeDraggable);

// --- LÓGICA DE LOGIN (ORIGINAL) ---
window.doLogin = function() {
    // Simulación de login - aquí mantienes tu lógica de Firebase
    document.getElementById('login-wrap').style.display = 'none';
};

// Se eliminó la función changeLang y el objeto de traducciones para simplificar
</script>

</body>
</html>
